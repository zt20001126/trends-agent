<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI跨境电商选品智能体</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --surface: #ffffff;
        --line: #d8dee8;
        --text: #172033;
        --muted: #627089;
        --primary: #1f5fbf;
        --primary-dark: #184c9a;
        --success: #147a55;
        --warning: #a16207;
        --error: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 28px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 5px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(180px, 1fr) auto;
        gap: 10px;
        margin-bottom: 28px;
      }

      input {
        width: 100%;
        min-height: 44px;
        padding: 10px 12px;
        border: 1px solid #b9c4d4;
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        font-size: 15px;
      }

      button {
        min-height: 44px;
        padding: 10px 18px;
        border: 0;
        border-radius: 8px;
        background: var(--primary);
        color: #ffffff;
        cursor: pointer;
        font-size: 15px;
      }

      button:hover {
        background: var(--primary-dark);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      section {
        margin-top: 28px;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 12px;
      }

      h2 {
        margin: 0;
        font-size: 20px;
        line-height: 1.3;
        letter-spacing: 0;
      }

      .hint {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }

      .steps {
        display: grid;
        gap: 10px;
      }

      .step {
        display: grid;
        grid-template-columns: 40px minmax(0, 1fr);
        gap: 12px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
      }

      .step-index {
        display: grid;
        place-items: center;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #eaf1fb;
        color: var(--primary);
        font-weight: 700;
        font-size: 13px;
      }

      .step.completed .step-index {
        background: #e7f5ee;
        color: var(--success);
      }

      .step.error .step-index {
        background: #fff0ed;
        color: var(--error);
      }

      .step-title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 5px;
      }

      .step-title {
        margin: 0;
        font-size: 16px;
        line-height: 1.35;
      }

      .step-status {
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      .step.completed .step-status {
        color: var(--success);
      }

      .step.error .step-status {
        color: var(--error);
      }

      .step-description,
      .step-summary {
        margin: 0;
        line-height: 1.6;
        font-size: 14px;
      }

      .step-description {
        color: var(--muted);
      }

      .step-summary {
        margin-top: 5px;
        color: var(--text);
      }

      details {
        margin-top: 8px;
      }

      summary {
        width: fit-content;
        color: var(--primary);
        cursor: pointer;
        font-size: 13px;
      }

      .detail-json,
      .report {
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfe;
        color: #263043;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .detail-json {
        max-height: 220px;
        margin: 8px 0 0;
        padding: 10px;
        font-size: 12px;
      }

      .report {
        min-height: 320px;
        margin: 0;
        padding: 18px;
        font-size: 14px;
        line-height: 1.7;
      }

      .empty {
        padding: 18px;
        border: 1px dashed #b9c4d4;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.62);
        color: var(--muted);
      }

      @media (max-width: 720px) {
        main {
          width: min(100% - 24px, 1120px);
          padding-top: 22px;
        }

        header,
        .section-head {
          align-items: flex-start;
          flex-direction: column;
        }

        .toolbar {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }

        .step {
          grid-template-columns: 34px minmax(0, 1fr);
          padding: 12px;
        }

        .step-title-row {
          align-items: flex-start;
          flex-direction: column;
          gap: 2px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>AI跨境电商选品智能体</h1>
          <p class="subtitle">输入商品关键词后，先查看 Agent 执行流程，再阅读最终选品报告。</p>
        </div>
        <span class="status-pill" id="run-status">等待分析</span>
      </header>

      <section class="toolbar" aria-label="选品分析输入">
        <input id="keyword" value="智能手环" aria-label="商品关键词" />
        <button id="analyze" type="button">开始分析</button>
      </section>

      <section aria-labelledby="flow-title">
        <div class="section-head">
          <h2 id="flow-title">Agent执行流程</h2>
          <p class="hint">每一步展示正在做什么、得到什么结果，以及后端返回的结构化数据。</p>
        </div>
        <div id="steps" class="steps">
          <div class="empty">点击开始分析后，这里会先显示待执行流程。</div>
        </div>
      </section>

      <section aria-labelledby="report-title">
        <div class="section-head">
          <h2 id="report-title">最终选品报告</h2>
          <p class="hint">报告由趋势、竞品、评论痛点和机会评分融合生成。</p>
        </div>
        <pre id="report" class="report">暂无报告。</pre>
      </section>
    </main>

    <script>
      const PLANNED_STEPS = [
        ["create_task_context", "创建分析任务", "接收关键词并创建本次分析上下文。"],
        ["normalize_keyword", "关键词归一化", "把中文关键词转换为适合美国站检索的英文关键词。"],
        ["plan_analysis", "任务规划", "确定趋势、商品、评论、评分和报告生成步骤。"],
        ["run_trend_skill", "趋势分析", "调用 Google Trends Tool 评估市场热度。"],
        ["run_product_skill", "竞品商品分析", "读取 Amazon 商品样本统计竞品格局。"],
        ["run_review_skill", "评论痛点分析", "分析评论样本并提取用户痛点。"],
        ["run_scoring_skill", "机会评分", "按趋势、竞争、痛点和利润潜力计算机会分。"],
        ["run_report_skill", "生成选品报告", "融合所有结果生成 Markdown 报告。"],
        ["persist_results", "保存分析结果", "把任务和分析结果写入 PostgreSQL。"]
      ];

      const STATUS_TEXT = {
        pending: "待执行",
        running: "执行中",
        completed: "已完成",
        error: "失败"
      };

      const button = document.getElementById("analyze");
      const keywordInput = document.getElementById("keyword");
      const report = document.getElementById("report");
      const stepsContainer = document.getElementById("steps");
      const runStatus = document.getElementById("run-status");

      function createStepCard(step, index) {
        const status = step.status || "pending";
        const card = document.createElement("article");
        card.className = `step ${status === "completed" ? "completed" : ""} ${status === "error" ? "error" : ""}`;

        const indexNode = document.createElement("div");
        indexNode.className = "step-index";
        indexNode.textContent = String(index + 1);

        const content = document.createElement("div");
        const titleRow = document.createElement("div");
        titleRow.className = "step-title-row";

        const title = document.createElement("h3");
        title.className = "step-title";
        title.textContent = step.title;

        const statusNode = document.createElement("span");
        statusNode.className = "step-status";
        statusNode.textContent = STATUS_TEXT[status] || status;

        const description = document.createElement("p");
        description.className = "step-description";
        description.textContent = step.description || "等待后端返回执行说明。";

        const summary = document.createElement("p");
        summary.className = "step-summary";
        summary.textContent = step.result_summary || "等待执行结果。";

        titleRow.append(title, statusNode);
        content.append(titleRow, description, summary);

        if (step.detail && Object.keys(step.detail).length > 0) {
          const detail = document.createElement("details");
          const detailSummary = document.createElement("summary");
          detailSummary.textContent = "查看结构化结果";
          const detailJson = document.createElement("pre");
          detailJson.className = "detail-json";
          detailJson.textContent = JSON.stringify(step.detail, null, 2);
          detail.append(detailSummary, detailJson);
          content.append(detail);
        }

        card.append(indexNode, content);
        return card;
      }

      function renderSteps(steps) {
        stepsContainer.replaceChildren();
        steps.forEach((step, index) => {
          stepsContainer.appendChild(createStepCard(step, index));
        });
      }

      function renderPendingSteps() {
        renderSteps(
          PLANNED_STEPS.map(([code, title, description], index) => ({
            code,
            title,
            description,
            status: index === 0 ? "running" : "pending",
            result_summary: index === 0 ? "正在提交分析请求。" : "等待执行。"
          }))
        );
      }

      async function analyzeSelection() {
        const keyword = keywordInput.value.trim();
        if (!keyword) {
          runStatus.textContent = "请输入关键词";
          keywordInput.focus();
          return;
        }

        button.disabled = true;
        runStatus.textContent = "分析中";
        report.textContent = "报告生成中，请稍候。";
        renderPendingSteps();

        try {
          const response = await fetch("/api/v1/selections/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ keyword, country: "US" })
          });
          const payload = await response.json();

          if (!response.ok || payload.code !== "SUCCESS") {
            throw new Error(payload.message || "分析请求失败");
          }

          const data = payload.data || {};
          renderSteps(data.execution_steps || []);
          report.textContent = data.report || "后端未返回报告。";
          runStatus.textContent = data.status === "completed_with_warnings" ? "完成但有降级" : "分析完成";
        } catch (error) {
          const message = error instanceof Error ? error.message : "分析失败";
          runStatus.textContent = "分析失败";
          report.textContent = message;
          renderSteps([
            {
              code: "request_failed",
              title: "请求失败",
              status: "error",
              description: "前端调用选品分析接口时发生错误。",
              result_summary: message,
              detail: {}
            }
          ]);
        } finally {
          button.disabled = false;
        }
      }

      button.addEventListener("click", analyzeSelection);
      keywordInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          analyzeSelection();
        }
      });
    </script>
  </body>
</html>
